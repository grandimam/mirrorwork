<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mirrorwork</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { mono: ["JetBrains Mono", "monospace"] },
            fontSize: { "2xs": "0.625rem" },
          },
        },
      };
    </script>
    <style>
      * {
        font-family: "JetBrains Mono", monospace;
      }
      .tabular-nums {
        font-variant-numeric: tabular-nums;
      }
    </style>
  </head>
  <body class="min-h-screen bg-stone-50 flex flex-col">
    <header
      class="bg-white border-b border-stone-200 h-12 flex items-center px-4"
    >
      <div class="max-w-6xl mx-auto w-full flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div
            class="w-8 h-8 bg-teal-500 rounded flex items-center justify-center"
          >
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="white"
              stroke-width="2.5"
            >
              <path d="M4 20V4l8 8 8-8v16" />
            </svg>
          </div>
          <span class="text-stone-900 font-semibold">mirrorwork</span>
          <span class="text-stone-400">|</span>
          <span class="text-stone-500 text-sm">Know where you stand.</span>
        </div>
        <span class="text-stone-400 text-sm" id="status">Ready</span>
      </div>
    </header>

    <main class="flex-1 py-8 px-4">
      <div class="max-w-6xl mx-auto space-y-8">
        <!-- Profile -->
        <section class="bg-white border border-stone-200 rounded p-6">
          <div class="flex items-start justify-between">
            <div>
              <h1 class="text-xl font-bold text-stone-900" id="name">-</h1>
              <p class="text-stone-500 mt-1" id="headline"></p>
            </div>
            <div class="text-right">
              <div class="text-2xs uppercase tracking-wider text-stone-400">
                Experience
              </div>
              <div
                class="text-2xl font-bold text-stone-900 tabular-nums"
                id="years"
              >
                -
              </div>
              <div class="text-stone-500 text-sm">years</div>
            </div>
          </div>
          <div
            class="grid grid-cols-4 gap-4 mt-6 pt-6 border-t border-stone-100"
          >
            <div>
              <div class="text-2xs uppercase tracking-wider text-stone-400">
                Companies
              </div>
              <div
                class="text-lg font-bold text-stone-900 tabular-nums"
                id="companies"
              >
                -
              </div>
            </div>
            <div>
              <div class="text-2xs uppercase tracking-wider text-stone-400">
                Proof Points
              </div>
              <div
                class="text-lg font-bold text-stone-900 tabular-nums"
                id="proofs-count"
              >
                -
              </div>
            </div>
            <div>
              <div class="text-2xs uppercase tracking-wider text-stone-400">
                Jobs Tracked
              </div>
              <div
                class="text-lg font-bold text-stone-900 tabular-nums"
                id="jobs-count"
              >
                -
              </div>
            </div>
            <div>
              <div class="text-2xs uppercase tracking-wider text-stone-400">
                Top Skills
              </div>
              <div class="text-sm text-stone-700" id="top-skills">-</div>
            </div>
          </div>
        </section>

        <!-- Jobs -->
        <section>
          <h2
            class="text-xs font-bold uppercase tracking-wider text-stone-400 mb-4"
          >
            Job Pipeline
          </h2>
          <div id="jobs" class="space-y-3"></div>
        </section>

        <!-- Proofs -->
        <section>
          <h2
            class="text-xs font-bold uppercase tracking-wider text-stone-400 mb-4"
          >
            Proof Points
          </h2>
          <div id="proofs" class="grid grid-cols-2 gap-3"></div>
        </section>
      </div>
    </main>

    <footer
      class="bg-white border-t border-stone-200 h-10 flex items-center px-4"
    >
      <div
        class="max-w-6xl mx-auto w-full flex items-center justify-between text-sm text-stone-400"
      >
        <span><span class="text-stone-300">&gt;</span> mirrorwork</span>
        <span>Run /mw dashboard to regenerate</span>
      </div>
    </footer>

    <script>
      // Data embedded by /mw dashboard
      const DATA = {};

      function fitColor(score) {
        if (!score) return "text-stone-400";
        if (score >= 80) return "text-teal-600";
        if (score >= 60) return "text-yellow-600";
        return "text-rose-600";
      }

      function render() {
        const { identity, positioning, experience, skills, proofPoints, jobs } =
          DATA;

        // Profile
        document.getElementById("name").textContent =
          identity?.name || positioning?.headline?.split(" ")[0] || "Unknown";
        document.getElementById("headline").textContent =
          positioning?.headline || "";
        document.getElementById("years").textContent =
          positioning?.years_experience || experience?.length || "-";
        document.getElementById("companies").textContent =
          experience?.length || "-";
        document.getElementById("proofs-count").textContent =
          proofPoints?.length || "-";
        document.getElementById("jobs-count").textContent = jobs?.length || "-";
        document.getElementById("top-skills").textContent =
          (skills?.expert || []).slice(0, 3).join(", ") || "-";

        // Jobs
        const jobsEl = document.getElementById("jobs");
        if (jobs?.length) {
          jobsEl.innerHTML = jobs
            .map(
              (j) => `
          <div class="bg-white border border-stone-200 rounded p-4 group hover:bg-stone-900 transition-colors">
            <div class="flex items-start justify-between">
              <div>
                <div class="flex items-center gap-2">
                  <span class="text-stone-900 font-semibold group-hover:text-white">${j.company}</span>
                  <span class="text-stone-400">|</span>
                  <span class="text-stone-600 group-hover:text-stone-300">${j.title}</span>
                </div>
                <div class="mt-2 flex gap-4 text-sm">
                  ${j.fit?.matches ? `<span class="text-teal-600 group-hover:text-teal-400">${j.fit.matches.length} matches</span>` : ""}
                  ${j.fit?.gaps ? `<span class="text-yellow-600 group-hover:text-yellow-400">${j.fit.gaps.length} gaps</span>` : ""}
                </div>
              </div>
              <div class="text-right">
                <div class="text-2xs uppercase tracking-wider text-stone-400">Fit</div>
                <div class="text-2xl font-bold tabular-nums ${fitColor(j.fit?.score)} group-hover:opacity-90">${j.fit?.score || "-"}%</div>
              </div>
            </div>
            ${j.fit?.verdict ? `<div class="mt-3 pt-3 border-t border-stone-100 group-hover:border-stone-700 text-sm text-stone-500 group-hover:text-stone-400">${j.fit.verdict}</div>` : ""}
          </div>
        `,
            )
            .join("");
        } else {
          jobsEl.innerHTML =
            '<div class="text-stone-400 text-center py-8">No jobs tracked</div>';
        }

        // Proofs
        const proofsEl = document.getElementById("proofs");
        if (proofPoints?.length) {
          proofsEl.innerHTML = proofPoints
            .slice(0, 8)
            .map(
              (p) => `
          <div class="bg-white border border-stone-200 rounded p-4 group hover:bg-stone-900 transition-colors">
            <div class="text-stone-900 font-medium group-hover:text-white">${p.summary}</div>
            <div class="mt-1 text-sm text-stone-500 group-hover:text-stone-400">${p.company} · ${p.date}</div>
            ${p.metrics ? `<div class="mt-2 text-sm text-teal-600 group-hover:text-teal-400">${Object.values(p.metrics).slice(0, 2).join(" · ")}</div>` : ""}
          </div>
        `,
            )
            .join("");
        }
      }

      render();
    </script>
  </body>
</html>
